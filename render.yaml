# Render Blueprint for the Node.js API.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file,
# creates the service, then prompts you to fill in the variables marked
# "sync: false" in the dashboard.
services:
  - type: web
    name: password-reset-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: RESET_TOKEN_EXPIRY_MINUTES
        value: "15"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
